<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麦快乐</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(160deg, #fdf2f8 0%, #faf5ff 40%, #f0f9ff 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    background: white; border-radius: 20px; padding: 40px 32px;
    max-width: 420px; width: 100%; text-align: center;
    box-shadow: 0 8px 40px rgba(124,58,237,0.1);
  }
  .card .logo { font-size: 48px; margin-bottom: 12px; }
  .card h1 {
    font-size: 1.6rem; font-weight: 800;
    background: linear-gradient(135deg, #e85d9a, #7c3aed);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 6px;
  }
  .card .sub { color: #6b7280; font-size: 0.9rem; margin-bottom: 28px; }
  .links { display: grid; gap: 12px; }
  .links a {
    display: block; padding: 16px 20px; border-radius: 14px;
    text-decoration: none; font-weight: 700; font-size: 1rem;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .links a:active { transform: scale(0.97); }
  .link-pink {
    background: linear-gradient(135deg, #fef0f6, #fdf2f8);
    color: #e85d9a; border: 1px solid #fce7f3;
  }
  .link-blue {
    background: linear-gradient(135deg, #eff6ff, #f0f9ff);
    color: #3b82f6; border: 1px solid #dbeafe;
  }
  .links a .icon { font-size: 1.3rem; margin-right: 6px; }
  .links a .desc { display: block; font-weight: 400; font-size: 0.78rem; margin-top: 4px; opacity: 0.7; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🎮</div>
  <h1>麦快乐</h1>
  <p class="sub">游戏搭子 · 真博主游戏陪玩</p>
  <div class="links">
    <a href="博主合作手册.html" class="link-pink">
      <span class="icon">🌸</span> 颜值博主合作计划
      <span class="desc">改个签就能赚钱，点我了解</span>
    </a>
    <a href="推客PR手册.html" class="link-blue">
      <span class="icon">📋</span> 推客 PR 操作手册
      <span class="desc">话术、流程、收益，全在这里</span>
    </a>
  </div>
</div>
</body>
</html>
